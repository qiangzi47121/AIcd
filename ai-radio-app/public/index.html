<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#7c3aed">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="AI电台">
<title>AI 个人电台</title>
<link rel="manifest" href="/manifest.json">
<style>
  /* ===== 全局重置 ===== */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f0f1a;
    --bg2: #1a1a2e;
    --bg3: #16213e;
    --card: #1e1e3a;
    --purple: #7c3aed;
    --purple2: #9d5cf6;
    --pink: #f472b6;
    --cyan: #06b6d4;
    --green: #10b981;
    --text: #f1f5f9;
    --text2: #94a3b8;
    --text3: #64748b;
    --radius: 16px;
    --shadow: 0 8px 32px rgba(124,58,237,.3);
  }
  html, body { height: 100%; overflow: hidden; }
  body {
    font-family: -apple-system, 'PingFang SC', 'Helvetica Neue', sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    flex-direction: column;
    height: 100dvh;
  }

  /* ===== 顶部标题栏 ===== */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 20px;
    background: linear-gradient(180deg, rgba(124,58,237,.15) 0%, transparent 100%);
    flex-shrink: 0;
  }
  .topbar-logo {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 18px;
    font-weight: 700;
    background: linear-gradient(90deg, var(--purple2), var(--pink));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .topbar-logo .dot {
    width: 8px; height: 8px;
    background: var(--green);
    border-radius: 50%;
    animation: pulse 1.5s infinite;
    -webkit-text-fill-color: unset;
    background-clip: unset;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: .5; transform: scale(.8); }
  }
  .status-badge {
    font-size: 11px;
    color: var(--text2);
    background: rgba(255,255,255,.07);
    padding: 4px 10px;
    border-radius: 20px;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .status-badge .live-dot {
    width: 6px; height: 6px;
    background: var(--green);
    border-radius: 50%;
    animation: pulse 1s infinite;
  }

  /* ===== 主内容区 ===== */
  .main { flex: 1; overflow-y: auto; padding: 0 16px; }
  .main::-webkit-scrollbar { display: none; }

  /* ===== 专辑封面区 ===== */
  .cover-section {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px 0 16px;
  }
  .cover-wrap {
    position: relative;
    width: min(280px, 70vw);
    height: min(280px, 70vw);
  }
  .cover-disc {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    object-fit: cover;
    border: 4px solid rgba(124,58,237,.4);
    box-shadow: 0 0 60px rgba(124,58,237,.5), 0 20px 60px rgba(0,0,0,.6);
    transition: transform .3s ease;
  }
  .cover-disc.spinning {
    animation: spin 8s linear infinite;
  }
  .cover-disc.paused { animation-play-state: paused; }
  @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  .cover-center {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 22%;
    height: 22%;
    background: var(--bg2);
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,.15);
  }

  /* 波形动画 */
  .wave-wrap {
    display: flex;
    align-items: flex-end;
    justify-content: center;
    gap: 4px;
    height: 40px;
    margin-top: 16px;
  }
  .wave-bar {
    width: 4px;
    border-radius: 2px;
    background: linear-gradient(180deg, var(--purple2), var(--pink));
    transition: height .2s ease;
  }
  .wave-bar.active { animation: wave var(--d, .8s) ease-in-out infinite alternate; }
  @keyframes wave { from { height: 4px; } to { height: var(--h, 30px); } }

  /* ===== 歌曲信息 ===== */
  .track-info {
    text-align: center;
    padding: 8px 20px;
  }
  .track-title {
    font-size: 20px;
    font-weight: 700;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .track-artist {
    font-size: 14px;
    color: var(--text2);
    margin-top: 4px;
  }
  .track-mood {
    display: inline-block;
    margin-top: 8px;
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 20px;
    background: rgba(124,58,237,.2);
    color: var(--purple2);
    border: 1px solid rgba(124,58,237,.3);
  }

  /* ===== 进度条 ===== */
  .progress-section { padding: 0 4px; }
  .progress-bar-wrap {
    position: relative;
    height: 4px;
    background: rgba(255,255,255,.1);
    border-radius: 2px;
    cursor: pointer;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--purple), var(--pink));
    border-radius: 2px;
    width: 0%;
    transition: width .5s linear;
  }
  .progress-thumb {
    position: absolute;
    top: 50%; right: -1%;
    transform: translate(50%, -50%);
    width: 12px; height: 12px;
    background: #fff;
    border-radius: 50%;
    box-shadow: 0 0 8px var(--purple);
    display: none;
  }
  .progress-bar-wrap:hover .progress-thumb { display: block; }
  .time-row {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: var(--text3);
    margin-top: 6px;
  }

  /* ===== 播放控制 ===== */
  .controls {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 24px;
    padding: 16px 0;
  }
  .btn-ctrl {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--text2);
    font-size: 22px;
    transition: all .2s;
    padding: 8px;
    border-radius: 50%;
  }
  .btn-ctrl:hover { color: var(--text); transform: scale(1.15); }
  .btn-play {
    width: 64px; height: 64px;
    background: linear-gradient(135deg, var(--purple), var(--purple2));
    color: #fff;
    font-size: 26px;
    box-shadow: var(--shadow);
    transition: transform .15s, box-shadow .15s;
  }
  .btn-play:hover { transform: scale(1.08); box-shadow: 0 12px 40px rgba(124,58,237,.5); }
  .btn-play:active { transform: scale(.95); }

  /* ===== AI 播报弹幕 ===== */
  .broadcast-box {
    background: linear-gradient(135deg, rgba(124,58,237,.15), rgba(244,114,182,.1));
    border: 1px solid rgba(124,58,237,.25);
    border-radius: var(--radius);
    padding: 12px 16px;
    margin: 8px 0;
    display: flex;
    align-items: flex-start;
    gap: 10px;
    min-height: 60px;
  }
  .broadcast-avatar {
    font-size: 24px;
    flex-shrink: 0;
    line-height: 1;
  }
  .broadcast-text {
    font-size: 13px;
    color: var(--text2);
    line-height: 1.6;
    flex: 1;
  }
  .broadcast-text.typing::after {
    content: '|';
    animation: blink .7s infinite;
  }
  @keyframes blink { 50% { opacity: 0; } }
  .btn-broadcast {
    flex-shrink: 0;
    background: rgba(124,58,237,.2);
    border: 1px solid rgba(124,58,237,.3);
    color: var(--purple2);
    border-radius: 8px;
    padding: 6px 10px;
    font-size: 12px;
    cursor: pointer;
    white-space: nowrap;
    transition: all .2s;
  }
  .btn-broadcast:hover { background: rgba(124,58,237,.35); }

  /* ===== 播放列表 ===== */
  .playlist-section { margin-bottom: 20px; }
  .section-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--text2);
    text-transform: uppercase;
    letter-spacing: .05em;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .section-title span { color: var(--text3); font-weight: normal; }
  .playlist { display: flex; flex-direction: column; gap: 2px; }
  .playlist-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 12px;
    border-radius: 10px;
    cursor: pointer;
    transition: background .15s;
    position: relative;
  }
  .playlist-item:hover { background: rgba(255,255,255,.05); }
  .playlist-item.active { background: rgba(124,58,237,.15); }
  .playlist-item.active::before {
    content: '';
    position: absolute;
    left: 0; top: 20%; bottom: 20%;
    width: 3px;
    background: var(--purple2);
    border-radius: 2px;
  }
  .pl-num {
    width: 20px;
    text-align: center;
    font-size: 13px;
    color: var(--text3);
    flex-shrink: 0;
  }
  .playlist-item.active .pl-num { color: var(--purple2); }
  .pl-cover {
    width: 40px; height: 40px;
    border-radius: 8px;
    object-fit: cover;
    flex-shrink: 0;
    background: var(--card);
  }
  .pl-info { flex: 1; min-width: 0; }
  .pl-title {
    font-size: 13px;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .pl-artist { font-size: 11px; color: var(--text3); margin-top: 2px; }
  .pl-mood {
    font-size: 10px;
    padding: 2px 6px;
    background: rgba(255,255,255,.06);
    border-radius: 10px;
    color: var(--text3);
    flex-shrink: 0;
  }
  .playlist-item.active .pl-mood { background: rgba(124,58,237,.2); color: var(--purple2); }

  /* ===== 底部导航 ===== */
  .navbar {
    flex-shrink: 0;
    display: flex;
    background: rgba(15,15,26,.95);
    backdrop-filter: blur(20px);
    border-top: 1px solid rgba(255,255,255,.06);
    padding-bottom: env(safe-area-inset-bottom);
  }
  .nav-item {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    padding: 10px 0;
    cursor: pointer;
    color: var(--text3);
    transition: color .2s;
    font-size: 10px;
    border: none;
    background: none;
  }
  .nav-item.active { color: var(--purple2); }
  .nav-item svg { width: 22px; height: 22px; }

  /* ===== 搜索面板 ===== */
  .panel {
    position: fixed;
    inset: 0;
    background: var(--bg);
    z-index: 100;
    display: flex;
    flex-direction: column;
    transform: translateX(100%);
    transition: transform .3s ease;
  }
  .panel.open { transform: translateX(0); }
  .panel-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 16px 20px;
    border-bottom: 1px solid rgba(255,255,255,.06);
    flex-shrink: 0;
  }
  .panel-back {
    background: none;
    border: none;
    color: var(--purple2);
    font-size: 20px;
    cursor: pointer;
    padding: 4px;
  }
  .panel-title { font-size: 17px; font-weight: 700; }
  .search-box {
    display: flex;
    gap: 8px;
    padding: 12px 16px;
    flex-shrink: 0;
  }
  .search-input {
    flex: 1;
    background: var(--card);
    border: 1px solid rgba(255,255,255,.1);
    border-radius: 12px;
    padding: 10px 14px;
    color: var(--text);
    font-size: 14px;
    outline: none;
  }
  .search-input:focus { border-color: var(--purple); }
  .search-input::placeholder { color: var(--text3); }
  .btn-search {
    background: var(--purple);
    border: none;
    color: #fff;
    border-radius: 12px;
    padding: 10px 16px;
    font-size: 14px;
    cursor: pointer;
  }
  .tag-list { display: flex; flex-wrap: wrap; gap: 8px; padding: 0 16px 12px; flex-shrink: 0; }
  .tag {
    padding: 5px 12px;
    border-radius: 20px;
    font-size: 12px;
    background: var(--card);
    color: var(--text2);
    cursor: pointer;
    border: 1px solid transparent;
    transition: all .2s;
  }
  .tag:hover, .tag.active { background: rgba(124,58,237,.2); color: var(--purple2); border-color: rgba(124,58,237,.3); }
  .panel-results { flex: 1; overflow-y: auto; padding: 0 16px; }
  .panel-results::-webkit-scrollbar { display: none; }

  /* ===== 设置面板 ===== */
  .setting-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 0;
    border-bottom: 1px solid rgba(255,255,255,.05);
    font-size: 14px;
  }
  .setting-item:last-child { border: none; }
  .setting-label { display: flex; align-items: center; gap: 10px; }
  .setting-icon { font-size: 20px; }
  .toggle {
    width: 44px; height: 24px;
    background: rgba(255,255,255,.1);
    border-radius: 12px;
    position: relative;
    cursor: pointer;
    transition: background .2s;
    border: none;
  }
  .toggle.on { background: var(--purple); }
  .toggle::after {
    content: '';
    position: absolute;
    top: 2px; left: 2px;
    width: 20px; height: 20px;
    background: #fff;
    border-radius: 50%;
    transition: transform .2s;
  }
  .toggle.on::after { transform: translateX(20px); }

  /* ===== Toast提示 ===== */
  .toast {
    position: fixed;
    bottom: 90px; left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: rgba(30,30,58,.95);
    border: 1px solid rgba(124,58,237,.3);
    color: var(--text);
    padding: 10px 20px;
    border-radius: 20px;
    font-size: 13px;
    opacity: 0;
    transition: all .3s;
    z-index: 200;
    pointer-events: none;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ===== 加载动画 ===== */
  .loading {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 30px;
    color: var(--text3);
    font-size: 13px;
  }
  .spinner {
    width: 20px; height: 20px;
    border: 2px solid rgba(124,58,237,.2);
    border-top-color: var(--purple);
    border-radius: 50%;
    animation: spin .8s linear infinite;
  }
</style>
</head>
<body>

<!-- ===== 顶部标题栏 ===== -->
<div class="topbar">
  <div class="topbar-logo">
    <div class="dot"></div>
    AI 个人电台
  </div>
  <div class="status-badge">
    <div class="live-dot"></div>
    <span id="statusText">正在连接...</span>
  </div>
</div>

<!-- ===== 主内容区 ===== -->
<div class="main" id="mainView">

  <!-- 专辑封面 -->
  <div class="cover-section">
    <div class="cover-wrap">
      <img id="coverImg" class="cover-disc" src="https://via.placeholder.com/300x300/1a1a2e/7c3aed?text=🎙️" alt="封面">
      <div class="cover-center"></div>
    </div>
    <!-- 波形动画 -->
    <div class="wave-wrap" id="waveWrap">
      <div class="wave-bar" style="--h:12px;--d:.6s"></div>
      <div class="wave-bar" style="--h:28px;--d:.9s"></div>
      <div class="wave-bar" style="--h:20px;--d:.7s"></div>
      <div class="wave-bar" style="--h:36px;--d:.5s"></div>
      <div class="wave-bar" style="--h:24px;--d:.8s"></div>
      <div class="wave-bar" style="--h:32px;--d:.6s"></div>
      <div class="wave-bar" style="--h:18px;--d:1s"></div>
      <div class="wave-bar" style="--h:26px;--d:.7s"></div>
    </div>
  </div>

  <!-- 歌曲信息 -->
  <div class="track-info">
    <div class="track-title" id="trackTitle">等待加载...</div>
    <div class="track-artist" id="trackArtist">— 点击播放开始 —</div>
    <span class="track-mood" id="trackMood">加载中</span>
  </div>

  <!-- 进度条 -->
  <div class="progress-section">
    <div class="progress-bar-wrap" id="progressBar" onclick="seekTo(event)">
      <div class="progress-fill" id="progressFill"></div>
      <div class="progress-thumb" id="progressThumb"></div>
    </div>
    <div class="time-row">
      <span id="timeNow">0:00</span>
      <span id="timeTotal">0:00</span>
    </div>
  </div>

  <!-- 播放控制 -->
  <div class="controls">
    <button class="btn-ctrl" onclick="toggleShuffle()" id="btnShuffle" title="随机">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="16 3 21 3 21 8"/><polyline points="4 20 21 3"/><polyline points="21 16 21 21 16 21"/><line x1="4" y1="4" x2="9" y2="9"/>
      </svg>
    </button>
    <button class="btn-ctrl" onclick="prevTrack()" title="上一首">
      <svg viewBox="0 0 24 24" fill="currentColor">
        <path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/>
      </svg>
    </button>
    <button class="btn-ctrl btn-play" id="btnPlay" onclick="togglePlay()" title="播放/暂停">
      <svg id="playIcon" viewBox="0 0 24 24" fill="currentColor">
        <path d="M8 5v14l11-7z"/>
      </svg>
    </button>
    <button class="btn-ctrl" onclick="nextTrack()" title="下一首">
      <svg viewBox="0 0 24 24" fill="currentColor">
        <path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/>
      </svg>
    </button>
    <button class="btn-ctrl" onclick="triggerBroadcast()" id="btnMic" title="AI播报">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
        <path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/>
      </svg>
    </button>
  </div>

  <!-- AI 播报 -->
  <div class="broadcast-box">
    <div class="broadcast-avatar">🎙️</div>
    <div class="broadcast-text" id="broadcastText">AI 主播正在待命，点击麦克风图标开始播报...</div>
    <button class="btn-broadcast" onclick="triggerBroadcast()">播报</button>
  </div>

  <!-- 播放列表 -->
  <div class="playlist-section">
    <div class="section-title">
      当前播放列表
      <span id="playlistCount">0 首</span>
    </div>
    <div class="playlist" id="playlist">
      <div class="loading"><div class="spinner"></div>正在加载音乐...</div>
    </div>
  </div>

</div>

<!-- ===== 搜索面板 ===== -->
<div class="panel" id="searchPanel">
  <div class="panel-header">
    <button class="panel-back" onclick="closePanel('searchPanel')">←</button>
    <div class="panel-title">发现音乐</div>
  </div>
  <div class="search-box">
    <input class="search-input" id="searchInput" placeholder="搜索歌手、歌名..." />
    <button class="btn-search" onclick="doSearch()">搜索</button>
  </div>
  <div class="tag-list">
    <div class="tag" onclick="searchByTag('pop')">流行</div>
    <div class="tag" onclick="searchByTag('jazz')">爵士</div>
    <div class="tag" onclick="searchByTag('classical')">古典</div>
    <div class="tag" onclick="searchByTag('electronic')">电子</div>
    <div class="tag" onclick="searchByTag('rock')">摇滚</div>
    <div class="tag" onclick="searchByTag('ambient')">氛围</div>
    <div class="tag" onclick="searchByTag('folk')">民谣</div>
    <div class="tag" onclick="searchByTag('hiphop')">嘻哈</div>
  </div>
  <div class="panel-results" id="searchResults">
    <div style="padding:30px;text-align:center;color:var(--text3);font-size:13px;">搜索你喜欢的音乐 🎵</div>
  </div>
</div>

<!-- ===== 设置面板 ===== -->
<div class="panel" id="settingsPanel">
  <div class="panel-header">
    <button class="panel-back" onclick="closePanel('settingsPanel')">←</button>
    <div class="panel-title">设置</div>
  </div>
  <div style="padding:0 20px;flex:1;overflow-y:auto">
    <div class="setting-item">
      <div class="setting-label"><span class="setting-icon">🔊</span>自动播报</div>
      <button class="toggle on" id="toggleBroadcast" onclick="toggleSetting('broadcast',this)"></button>
    </div>
    <div class="setting-item">
      <div class="setting-label"><span class="setting-icon">🔀</span>随机播放</div>
      <button class="toggle" id="toggleShuffle" onclick="toggleSetting('shuffle',this)"></button>
    </div>
    <div class="setting-item">
      <div class="setting-label"><span class="setting-icon">🔁</span>单曲循环</div>
      <button class="toggle" id="toggleRepeat" onclick="toggleSetting('repeat',this)"></button>
    </div>
    <div class="setting-item">
      <div class="setting-label"><span class="setting-icon">🌤️</span>播报天气</div>
      <button class="toggle on" id="toggleWeather" onclick="toggleSetting('weather',this)"></button>
    </div>
    <div class="setting-item">
      <div class="setting-label"><span class="setting-icon">📱</span>关于</div>
      <span style="color:var(--text3);font-size:13px">AI 电台 v1.0</span>
    </div>
    <div class="setting-item">
      <div class="setting-label"><span class="setting-icon">⬇️</span>安装到主屏幕</div>
      <button class="btn-search" id="btnInstall" onclick="installPWA()" style="font-size:12px;padding:6px 12px;display:none">安装</button>
    </div>
  </div>
</div>

<!-- ===== 底部导航 ===== -->
<nav class="navbar">
  <button class="nav-item active" onclick="switchTab('home',this)">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
    首页
  </button>
  <button class="nav-item" onclick="switchTab('search',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    发现
  </button>
  <button class="nav-item" onclick="switchTab('settings',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
    设置
  </button>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Audio -->
<audio id="audioPlayer" preload="none"></audio>

<script>
// ==================== 状态管理 ====================
const state = {
  tracks: [],
  currentIndex: 0,
  isPlaying: false,
  isShuffle: false,
  isRepeat: false,
  playCount: 0,
  weather: { city: '', mood: '晴朗', weather: '晴朗' },
  settings: { broadcast: true, shuffle: false, repeat: false, weather: true },
  deferredPrompt: null
};

const audio = document.getElementById('audioPlayer');

// ==================== 初始化 ====================
async function init() {
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js').catch(() => {});
  }
  await fetchWeather();
  await loadTracks();
  setupAudioEvents();
  updateStatus('在线');
}

async function fetchWeather() {
  try {
    const res = await fetch('/api/weather');
    const data = await res.json();
    if (data.success) state.weather = data;
  } catch {}
}

async function loadTracks(url = '/api/trending') {
  document.getElementById('playlist').innerHTML = '<div class="loading"><div class="spinner"></div>加载中...</div>';
  try {
    const res = await fetch(url);
    const data = await res.json();
    if (data.success && data.tracks.length > 0) {
      state.tracks = data.tracks;
      renderPlaylist();
      loadTrack(0, false);
      showToast(`已加载 ${data.tracks.length} 首歌曲`);
    }
  } catch (err) {
    document.getElementById('playlist').innerHTML = '<div class="loading">加载失败，请检查网络</div>';
  }
}

// ==================== 播放器核心 ====================
function loadTrack(index, autoplay = false) {
  if (!state.tracks.length) return;
  state.currentIndex = index;
  const t = state.tracks[index];

  document.getElementById('coverImg').src = t.cover;
  document.getElementById('trackTitle').textContent = t.title;
  document.getElementById('trackArtist').textContent = t.artist;
  document.getElementById('trackMood').textContent = t.mood || '未知';
  document.getElementById('progressFill').style.width = '0%';
  document.getElementById('timeNow').textContent = '0:00';
  document.getElementById('timeTotal').textContent = formatTime(t.duration || 0);

  audio.src = t.url;
  if (autoplay) {
    audio.play().then(() => setPlaying(true)).catch(() => setPlaying(false));
  }
  renderPlaylist();
}

function togglePlay() {
  if (!state.tracks.length) { showToast('请等待音乐加载完成'); return; }
  if (state.isPlaying) {
    audio.pause();
    setPlaying(false);
  } else {
    audio.play().then(() => setPlaying(true)).catch(e => {
      showToast('播放失败，请重试');
      setPlaying(false);
    });
  }
}

function setPlaying(playing) {
  state.isPlaying = playing;
  const icon = document.getElementById('playIcon');
  const cover = document.getElementById('coverImg');
  const waves = document.querySelectorAll('.wave-bar');

  if (playing) {
    icon.innerHTML = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';
    cover.className = 'cover-disc spinning';
    waves.forEach(w => w.classList.add('active'));
    state.playCount++;
  } else {
    icon.innerHTML = '<path d="M8 5v14l11-7z"/>';
    cover.className = 'cover-disc paused';
    waves.forEach(w => w.classList.remove('active'));
  }
}

function nextTrack() {
  let next;
  if (state.isShuffle) {
    next = Math.floor(Math.random() * state.tracks.length);
  } else {
    next = (state.currentIndex + 1) % state.tracks.length;
  }
  loadTrack(next, state.isPlaying);
  if (state.settings.broadcast) setTimeout(() => triggerBroadcast(), 800);
}

function prevTrack() {
  if (audio.currentTime > 3) { audio.currentTime = 0; return; }
  const prev = (state.currentIndex - 1 + state.tracks.length) % state.tracks.length;
  loadTrack(prev, state.isPlaying);
}

function toggleShuffle() {
  state.isShuffle = !state.isShuffle;
  const btn = document.getElementById('btnShuffle');
  btn.style.color = state.isShuffle ? 'var(--purple2)' : '';
  showToast(state.isShuffle ? '随机播放已开启' : '随机播放已关闭');
}

function seekTo(e) {
  const bar = document.getElementById('progressBar');
  const rect = bar.getBoundingClientRect();
  const ratio = (e.clientX - rect.left) / rect.width;
  audio.currentTime = ratio * (audio.duration || 0);
}

// ==================== 音频事件 ====================
function setupAudioEvents() {
  audio.addEventListener('timeupdate', () => {
    if (!audio.duration) return;
    const pct = (audio.currentTime / audio.duration) * 100;
    document.getElementById('progressFill').style.width = pct + '%';
    document.getElementById('timeNow').textContent = formatTime(audio.currentTime);
  });

  audio.addEventListener('loadedmetadata', () => {
    document.getElementById('timeTotal').textContent = formatTime(audio.duration);
  });

  audio.addEventListener('ended', () => {
    if (state.settings.repeat) {
      audio.play();
    } else {
      nextTrack();
    }
  });

  audio.addEventListener('error', () => {
    showToast('当前曲目加载失败，跳转下一首');
    setTimeout(nextTrack, 1500);
  });
}

// ==================== AI 播报 ====================
async function triggerBroadcast() {
  const t = state.tracks[state.currentIndex];
  const next = state.tracks[(state.currentIndex + 1) % state.tracks.length];
  const el = document.getElementById('broadcastText');

  el.textContent = '';
  el.classList.add('typing');

  try {
    const res = await fetch('/api/broadcast', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        track: t,
        nextTrack: next,
        weather: state.weather.weather,
        city: state.weather.city,
        playCount: state.playCount
      })
    });
    const data = await res.json();
    if (data.success) {
      typewriterEffect(el, data.script);
      if (state.settings.broadcast) speak(data.script);
    }
  } catch {
    typewriterEffect(el, '电台信号有点弱，主播稍后回来～');
  }
}

function typewriterEffect(el, text) {
  el.classList.add('typing');
  el.textContent = '';
  let i = 0;
  const timer = setInterval(() => {
    el.textContent += text[i++];
    if (i >= text.length) {
      clearInterval(timer);
      el.classList.remove('typing');
    }
  }, 40);
}

function speak(text) {
  if (!('speechSynthesis' in window)) return;
  window.speechSynthesis.cancel();
  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = 'zh-CN';
  utter.rate = 0.9;
  utter.pitch = 1.0;
  // 优先选中文声音
  const voices = window.speechSynthesis.getVoices();
  const zh = voices.find(v => v.lang.includes('zh'));
  if (zh) utter.voice = zh;
  window.speechSynthesis.speak(utter);
}

// ==================== 搜索 ====================
async function doSearch() {
  const q = document.getElementById('searchInput').value.trim();
  if (!q) return;
  renderSearchLoading();
  try {
    const res = await fetch(`/api/search?q=${encodeURIComponent(q)}&limit=20`);
    const data = await res.json();
    renderSearchResults(data.tracks || []);
  } catch { renderSearchResults([]); }
}

async function searchByTag(tag) {
  document.querySelectorAll('.tag').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');
  renderSearchLoading();
  try {
    const res = await fetch(`/api/search?tags=${tag}&limit=20`);
    const data = await res.json();
    renderSearchResults(data.tracks || []);
  } catch { renderSearchResults([]); }
}

function renderSearchLoading() {
  document.getElementById('searchResults').innerHTML = '<div class="loading"><div class="spinner"></div>搜索中...</div>';
}

function renderSearchResults(tracks) {
  const el = document.getElementById('searchResults');
  if (!tracks.length) { el.innerHTML = '<div class="loading">没有找到相关歌曲</div>'; return; }
  el.innerHTML = tracks.map((t, i) => `
    <div class="playlist-item" onclick="addAndPlay(${JSON.stringify(t).replace(/"/g, '&quot;')})">
      <div class="pl-num">${i + 1}</div>
      <img class="pl-cover" src="${t.cover}" alt="${t.title}" onerror="this.src='https://via.placeholder.com/40x40/1a1a2e/fff?text=🎵'">
      <div class="pl-info">
        <div class="pl-title">${t.title}</div>
        <div class="pl-artist">${t.artist}</div>
      </div>
      <div class="pl-mood">${t.mood || ''}</div>
    </div>
  `).join('');
}

function addAndPlay(track) {
  const exists = state.tracks.find(t => t.id === track.id);
  if (!exists) { state.tracks.unshift(track); state.currentIndex = 0; }
  else { state.currentIndex = state.tracks.indexOf(exists); }
  loadTrack(state.currentIndex, true);
  renderPlaylist();
  closePanel('searchPanel');
  showToast(`已添加《${track.title}》`);
}

// ==================== 渲染播放列表 ====================
function renderPlaylist() {
  const el = document.getElementById('playlist');
  document.getElementById('playlistCount').textContent = `${state.tracks.length} 首`;
  if (!state.tracks.length) { el.innerHTML = '<div class="loading">播放列表为空</div>'; return; }
  el.innerHTML = state.tracks.map((t, i) => `
    <div class="playlist-item ${i === state.currentIndex ? 'active' : ''}" onclick="loadTrack(${i}, true)">
      <div class="pl-num">${i === state.currentIndex ? '▶' : i + 1}</div>
      <img class="pl-cover" src="${t.cover}" alt="${t.title}" onerror="this.src='https://via.placeholder.com/40x40/1a1a2e/fff?text=🎵'">
      <div class="pl-info">
        <div class="pl-title">${t.title}</div>
        <div class="pl-artist">${t.artist}</div>
      </div>
      <div class="pl-mood">${t.mood || ''}</div>
    </div>
  `).join('');
  // 滚动到当前
  const active = el.querySelector('.active');
  if (active) active.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
}

// ==================== 设置 ====================
function toggleSetting(key, btn) {
  state.settings[key] = !state.settings[key];
  btn.classList.toggle('on', state.settings[key]);
  if (key === 'shuffle') state.isShuffle = state.settings[key];
  if (key === 'repeat') state.isRepeat = state.settings[key];
}

// ==================== 导航 ====================
function switchTab(tab, el) {
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  el.classList.add('active');
  if (tab === 'search') openPanel('searchPanel');
  else if (tab === 'settings') openPanel('settingsPanel');
}

function openPanel(id) {
  document.getElementById(id).classList.add('open');
}

function closePanel(id) {
  document.getElementById(id).classList.remove('open');
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.querySelector('.nav-item').classList.add('active');
}

// ==================== PWA 安装 ====================
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  state.deferredPrompt = e;
  document.getElementById('btnInstall').style.display = 'block';
});

async function installPWA() {
  if (!state.deferredPrompt) { showToast('请在Chrome/Edge浏览器中打开以安装'); return; }
  state.deferredPrompt.prompt();
  const result = await state.deferredPrompt.userChoice;
  if (result.outcome === 'accepted') showToast('安装成功！可在桌面找到AI电台');
  state.deferredPrompt = null;
}

// ==================== 工具函数 ====================
function formatTime(s) {
  const m = Math.floor(s / 60), sec = Math.floor(s % 60);
  return `${m}:${sec.toString().padStart(2, '0')}`;
}

function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(el._timer);
  el._timer = setTimeout(() => el.classList.remove('show'), 2500);
}

function updateStatus(text) {
  document.getElementById('statusText').textContent = text;
}

// 声音API初始化（需要用户手势）
document.addEventListener('click', () => {
  if (window.speechSynthesis) window.speechSynthesis.getVoices();
}, { once: true });

// 启动
init();
</script>
